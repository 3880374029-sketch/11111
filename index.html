<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ 星际幸存者</title>
<style>
/* ===== 全局 ===== */
* { margin:0; padding:0; box-sizing:border-box; user-select:none; }
body {
  background: #0f0b1a;
  background-image: radial-gradient(ellipse at 20% 30%, #1a1128 0%, #0b0815 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  touch-action: none;
  overflow: hidden;
  padding: 12px;
}
.game-wrapper {
  background: rgba(22, 18, 38, 0.75);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 32px;
  padding: 14px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,215,150,0.06) inset;
  position: relative;
  max-width: 640px;
  width: 100%;
  border: 1px solid rgba(255,200,160,0.06);
}
canvas {
  display: block;
  width: 100%;
  aspect-ratio: 600/800;
  border-radius: 20px;
  background: #0e0b1a;
  cursor: none;
  touch-action: none;
  box-shadow: 0 0 40px rgba(120,80,200,0.08);
}

/* ===== HUD — 更温暖、更活泼 ===== */
.hud {
  position: absolute;
  top: 18px;
  left: 18px;
  right: 18px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  pointer-events: none;
  z-index: 6;
  flex-wrap: wrap;
  gap: 6px;
}
.hud-left {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  background: rgba(12, 8, 24, 0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 6px 14px 6px 16px;
  border-radius: 40px;
  border: 1px solid rgba(255,215,180,0.08);
  pointer-events: auto;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.hud-left span {
  color: rgba(255,235,220,0.85);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.3px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.hud-left .num {
  color: #ffe1c6;
  font-weight: 700;
  font-size: 15px;
  min-width: 18px;
  display: inline-block;
}
.hud-left .heart { color: #ff7b8a; }
.hud-left .score-icon { color: #f9ca6b; }
.hud-left .wave-icon { color: #7ec8e3; }
.hud-left .stage-icon { color: #c9a0ff; }

.hud-right {
  background: rgba(12, 8, 24, 0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 6px 16px 6px 16px;
  border-radius: 40px;
  border: 1px solid rgba(255,215,180,0.08);
  pointer-events: auto;
  text-align: right;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  min-width: 100px;
}
.hud-right .level-row {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
}
.hud-right .level-label {
  color: rgba(255,220,190,0.5);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
}
.hud-right .level-num {
  color: #f9d78c;
  font-weight: 700;
  font-size: 16px;
}
.exp-track {
  width: 100%;
  height: 4px;
  background: rgba(255,220,190,0.08);
  border-radius: 20px;
  margin-top: 4px;
  overflow: hidden;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
}
.exp-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #f9c97c, #f5b56b, #f09a5a);
  border-radius: 20px;
  transition: width 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.hud-right .kill-stat {
  font-size: 10px;
  color: rgba(255,220,190,0.35);
  margin-top: 2px;
  letter-spacing: 0.5px;
}
.hud-right .kill-stat strong {
  color: rgba(255,220,190,0.6);
  font-weight: 600;
}

/* 灵敏度 + 手柄状态 — 更小巧可爱 */
.hud-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 2px;
  justify-content: flex-end;
}
.sens-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,220,190,0.05);
  padding: 2px 10px 2px 8px;
  border-radius: 30px;
  border: 1px solid rgba(255,220,190,0.05);
}
.sens-wrap .label {
  color: rgba(255,220,190,0.35);
  font-size: 11px;
}
.sens-wrap input[type="range"] {
  width: 52px;
  height: 3px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(255,220,190,0.12);
  border-radius: 10px;
  outline: none;
  cursor: pointer;
}
.sens-wrap input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: radial-gradient(circle, #f9d78c, #e8b06a);
  cursor: pointer;
  border: none;
  box-shadow: 0 0 12px rgba(249,215,140,0.2);
}
.sens-wrap input[type="range"]::-moz-range-thumb {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: radial-gradient(circle, #f9d78c, #e8b06a);
  cursor: pointer;
  border: none;
}
.sens-wrap .val {
  color: #f9d78c;
  font-size: 11px;
  font-weight: 600;
  min-width: 28px;
  text-align: center;
}
.gamepad-badge {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 30px;
  background: rgba(255,220,190,0.04);
  border: 1px solid rgba(255,220,190,0.05);
  color: rgba(255,220,190,0.25);
  transition: 0.3s;
}
.gamepad-badge.on {
  color: #8ed6c4;
  border-color: rgba(142,214,196,0.15);
  background: rgba(142,214,196,0.06);
}
.gamepad-badge.off {
  color: rgba(255,220,190,0.15);
}

.exit-btn {
  background: rgba(255,120,130,0.08);
  border: 1px solid rgba(255,120,130,0.06);
  color: rgba(255,150,160,0.5);
  padding: 2px 12px;
  border-radius: 30px;
  font-size: 12px;
  cursor: pointer;
  pointer-events: auto;
  transition: 0.25s;
  font-weight: 500;
  letter-spacing: 0.5px;
}
.exit-btn:hover {
  background: rgba(255,120,130,0.15);
  color: rgba(255,150,160,0.8);
  border-color: rgba(255,120,130,0.15);
}

/* ===== 模式选择面板 — 温暖、手作感 ===== */
.mode-panel {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(12, 8, 24, 0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 32px;
  z-index: 40;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 24px 18px;
  overflow-y: auto;
  border: 1px solid rgba(255,215,180,0.04);
}
.mode-panel.hidden { display: none; }
.mode-panel .title {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #f9d78c, #f5b56b, #e8a06a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 2px;
  text-shadow: 0 0 60px rgba(249,215,140,0.08);
}
.mode-panel .sub {
  color: rgba(255,220,190,0.3);
  font-size: 14px;
  margin-bottom: 16px;
  font-weight: 400;
  letter-spacing: 2px;
}
.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  width: 100%;
  max-width: 520px;
}
.mode-card {
  background: rgba(255,220,190,0.03);
  border: 1px solid rgba(255,220,190,0.04);
  border-radius: 16px;
  padding: 12px 6px 10px;
  cursor: pointer;
  transition: 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  text-align: center;
  pointer-events: auto;
}
.mode-card:hover {
  background: rgba(255,220,190,0.06);
  border-color: rgba(249,215,140,0.12);
  transform: translateY(-2px);
}
.mode-card .icon { font-size: 26px; display: block; margin-bottom: 2px; }
.mode-card .name {
  color: rgba(255,235,220,0.8);
  font-size: 13px;
  font-weight: 600;
}
.mode-card .desc {
  color: rgba(255,220,190,0.25);
  font-size: 10px;
  margin-top: 2px;
  line-height: 1.3;
}
.mode-card.active {
  border-color: rgba(249,215,140,0.2);
  background: rgba(249,215,140,0.04);
  box-shadow: 0 0 30px rgba(249,215,140,0.02);
}
.mode-card.active .name { color: #f9d78c; }

.diff-row {
  display: flex;
  gap: 8px;
  margin: 12px 0 10px;
}
.diff-btn {
  padding: 5px 20px;
  border-radius: 40px;
  border: 1px solid rgba(255,220,190,0.06);
  background: rgba(255,220,190,0.02);
  color: rgba(255,220,190,0.3);
  cursor: pointer;
  transition: 0.2s;
  font-size: 13px;
  pointer-events: auto;
  font-weight: 500;
}
.diff-btn:hover { background: rgba(255,220,190,0.04); }
.diff-btn.active {
  border-color: rgba(249,215,140,0.15);
  color: #f9d78c;
  background: rgba(249,215,140,0.04);
}

.settings-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 6px 0 12px;
  flex-wrap: wrap;
  justify-content: center;
}
.settings-row label {
  color: rgba(255,220,190,0.3);
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.settings-row input[type="range"] {
  width: 80px;
  height: 3px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(255,220,190,0.08);
  border-radius: 10px;
  outline: none;
}
.settings-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: radial-gradient(circle, #f9d78c, #e8b06a);
  cursor: pointer;
  border: none;
}
.settings-row input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: radial-gradient(circle, #f9d78c, #e8b06a);
  cursor: pointer;
  border: none;
}
.settings-row .gp-status {
  color: rgba(255,220,190,0.2);
  font-size: 12px;
}
.settings-row .gp-status.on { color: #8ed6c4; }

.start-btn {
  padding: 10px 48px;
  border-radius: 60px;
  background: linear-gradient(135deg, #f9d78c, #f0b86a, #e8a060);
  border: none;
  color: #120d1e;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: auto;
  margin-top: 4px;
  box-shadow: 0 4px 30px rgba(249,215,140,0.08);
  letter-spacing: 1px;
}
.start-btn:hover { transform: scale(1.04); box-shadow: 0 8px 50px rgba(249,215,140,0.12); }
.start-btn:active { transform: scale(0.96); }
.mode-panel .footnote {
  margin-top: 8px;
  color: rgba(255,220,190,0.1);
  font-size: 10px;
  letter-spacing: 1px;
}

/* ===== 升级面板 ===== */
.upgrade-panel {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(14, 10, 28, 0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,215,180,0.06);
  border-radius: 28px;
  padding: 20px 18px 24px;
  width: 92%;
  max-width: 380px;
  box-shadow: 0 30px 100px rgba(0,0,0,0.8);
  z-index: 20;
  display: none;
  text-align: center;
  pointer-events: auto;
}
.upgrade-panel h2 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, #f9d78c, #f0b86a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 2px;
  letter-spacing: 2px;
}
.upgrade-panel .sub {
  color: rgba(255,220,190,0.2);
  font-size: 12px;
  margin-bottom: 14px;
  letter-spacing: 1px;
}
.upgrade-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.upgrade-card {
  background: rgba(255,220,190,0.02);
  border: 1px solid rgba(255,220,190,0.04);
  border-radius: 14px;
  padding: 12px 6px;
  cursor: pointer;
  transition: 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: auto;
  text-align: center;
}
.upgrade-card:hover {
  background: rgba(255,220,190,0.05);
  border-color: rgba(249,215,140,0.1);
  transform: scale(1.03);
}
.upgrade-card:active { transform: scale(0.95); }
.upgrade-card .icon { font-size: 22px; display: block; }
.upgrade-card .name { color: #f0e0d0; font-weight: 600; font-size: 13px; margin-top: 2px; }
.upgrade-card .desc { color: rgba(255,220,190,0.25); font-size: 10px; }

/* ===== 游戏结束 ===== */
.gameover-panel {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(8, 5, 18, 0.78);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 30;
  border-radius: 32px;
  flex-direction: column;
  color: #fff;
  text-align: center;
  padding: 24px;
}
.gameover-panel.show { display: flex; }
.gameover-panel h1 {
  font-size: 40px;
  font-weight: 700;
  color: #ff7b8a;
  text-shadow: 0 0 60px rgba(255,120,130,0.1);
  letter-spacing: 2px;
}
.gameover-panel .score-final {
  font-size: 26px;
  margin: 6px 0;
  color: #f9d78c;
  font-weight: 600;
}
.gameover-panel .stats {
  font-size: 14px;
  color: rgba(255,220,190,0.3);
  margin: 3px 0;
  letter-spacing: 0.5px;
}
.gameover-panel .stats strong { color: rgba(255,220,190,0.6); font-weight: 600; }
.gameover-panel .restart-btn {
  margin-top: 16px;
  padding: 10px 36px;
  background: rgba(255,220,190,0.04);
  border: 1px solid rgba(255,220,190,0.06);
  border-radius: 60px;
  color: rgba(255,235,220,0.7);
  font-size: 17px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.25s;
  pointer-events: auto;
}
.gameover-panel .restart-btn:hover {
  background: rgba(255,220,190,0.08);
  border-color: rgba(255,220,190,0.12);
}
.gameover-panel .back-btn {
  margin-top: 6px;
  padding: 6px 24px;
  background: transparent;
  border: none;
  color: rgba(255,220,190,0.15);
  font-size: 13px;
  cursor: pointer;
  transition: 0.2s;
  pointer-events: auto;
}
.gameover-panel .back-btn:hover { color: rgba(255,220,190,0.3); }

/* ===== 响应式 ===== */
@media (max-width: 520px) {
  .mode-grid { grid-template-columns: 1fr 1fr; }
  .mode-panel .title { font-size: 24px; }
  .hud { top: 12px; left: 12px; right: 12px; }
  .hud-left { padding: 4px 10px 4px 12px; gap: 6px; }
  .hud-left span { font-size: 11px; }
  .hud-left .num { font-size: 13px; }
  .hud-right { padding: 4px 12px; min-width: 80px; }
  .hud-right .level-num { font-size: 14px; }
  .sens-wrap input[type="range"] { width: 40px; }
  .upgrade-grid { grid-template-columns: 1fr 1fr; }
  .gameover-panel h1 { font-size: 30px; }
  .settings-row input[type="range"] { width: 60px; }
}
@media (max-width: 400px) {
  .mode-grid { grid-template-columns: 1fr 1fr; gap: 4px; }
  .mode-card { padding: 8px 4px; }
  .mode-card .icon { font-size: 20px; }
  .mode-card .name { font-size: 11px; }
}
</style>
</head>
<body>
<div class="game-wrapper">
<canvas id="gameCanvas" width="600" height="800"></canvas>

<!-- ===== 模式选择 ===== -->
<div class="mode-panel" id="modePanel">
  <div class="title">✦ 星际幸存者</div>
  <div class="sub">选个模式，开始冒险</div>
  <div class="mode-grid" id="modeGrid"></div>
  <div class="diff-row" id="diffRow">
    <button class="diff-btn active" data-diff="0">✦ 简单</button>
    <button class="diff-btn" data-diff="1">✦ 普通</button>
    <button class="diff-btn" data-diff="2">✦ 困难</button>
  </div>
  <div class="settings-row">
    <label>🎯 灵敏度 <input type="range" id="menuSensitivity" min="2" max="50" value="18"> <span id="menuSensVal">0.18</span></label>
    <span class="gp-status" id="menuGamepadStatus">🎮 —</span>
  </div>
  <button class="start-btn" id="startBtn">✦ 开始战斗</button>
  <div class="footnote">空格 / 手柄A键 释放技能</div>
</div>

<!-- ===== HUD ===== -->
<div class="hud" id="hud">
  <div class="hud-left">
    <span><span class="heart">♥</span> <span class="num" id="livesDisplay">3</span></span>
    <span><span class="score-icon">✦</span> <span class="num" id="scoreDisplay">0</span></span>
    <span><span class="wave-icon">~</span> <span class="num" id="waveDisplay">0</span></span>
    <span><span class="stage-icon">◈</span> <span class="num" id="stageDisplay">0</span></span>
    <span class="timer" id="timerDisplay"></span>
    <button class="exit-btn" id="exitBtn">✕ 退出</button>
  </div>
  <div class="hud-right">
    <div class="level-row">
      <span class="level-label">等级</span>
      <span class="level-num" id="levelDisplay">1</span>
    </div>
    <div class="exp-track"><div class="exp-fill" id="expFill"></div></div>
    <div class="kill-stat">击杀 <strong id="killStat">0</strong></div>
    <div class="hud-controls">
      <div class="sens-wrap">
        <span class="label">🎯</span>
        <input type="range" id="gameSensitivity" min="2" max="50" value="18">
        <span class="val" id="gameSensVal">0.18</span>
      </div>
      <span class="gamepad-badge off" id="gamepadStatus">🎮 ✕</span>
    </div>
  </div>
</div>

<!-- ===== 升级 ===== -->
<div class="upgrade-panel" id="upgradePanel">
  <h2>✦ 升级</h2>
  <div class="sub">选一个强化吧</div>
  <div class="upgrade-grid" id="upgradeGrid"></div>
</div>

<!-- ===== 游戏结束 ===== -->
<div class="gameover-panel" id="gameoverPanel">
  <h1>✦ 坠毁</h1>
  <div class="score-final">得分 <span id="finalScore">0</span></div>
  <div class="stats">关卡 <strong id="finalStage">0</strong> · 波次 <strong id="finalWave">0</strong></div>
  <div class="stats">击杀 <strong id="finalKills">0</strong> · 最高连击 <strong id="finalCombo">0</strong></div>
  <div class="stats" style="font-size:12px;color:rgba(255,220,190,0.15);" id="finalMode">—</div>
  <button class="restart-btn" id="restartBtn">✦ 再来一局</button>
  <button class="back-btn" id="backMenuBtn">⇽ 返回菜单</button>
</div>
</div>

<script>
// ================================================================
//  游戏逻辑 — 完整保留，仅 UI 样式焕新
//  包含：10模式×3难度 · 慢升级 · 手柄 · 灵敏度 · 全部玩法
// ================================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W=600, H=800;

// ---------- DOM ----------
const livesSpan=document.getElementById('livesDisplay');
const scoreSpan=document.getElementById('scoreDisplay');
const waveSpan=document.getElementById('waveDisplay');
const stageSpan=document.getElementById('stageDisplay');
const levelSpan=document.getElementById('levelDisplay');
const expFill=document.getElementById('expFill');
const killStat=document.getElementById('killStat');
const timerDisplay=document.getElementById('timerDisplay');
const upgradePanel=document.getElementById('upgradePanel');
const upgradeGrid=document.getElementById('upgradeGrid');
const gameoverPanel=document.getElementById('gameoverPanel');
const finalScore=document.getElementById('finalScore');
const finalWave=document.getElementById('finalWave');
const finalStage=document.getElementById('finalStage');
const finalKills=document.getElementById('finalKills');
const finalCombo=document.getElementById('finalCombo');
const finalMode=document.getElementById('finalMode');
const restartBtn=document.getElementById('restartBtn');
const backMenuBtn=document.getElementById('backMenuBtn');
const modePanel=document.getElementById('modePanel');
const modeGrid=document.getElementById('modeGrid');
const diffRow=document.getElementById('diffRow');
const startBtn=document.getElementById('startBtn');
const exitBtn=document.getElementById('exitBtn');
const gameSensitivity=document.getElementById('gameSensitivity');
const gameSensVal=document.getElementById('gameSensVal');
const menuSensitivity=document.getElementById('menuSensitivity');
const menuSensVal=document.getElementById('menuSensVal');

}

function getModeConfig(modeIdx, diffIdx){
const diff=DIFFICULTIES[diffIdx].multiplier;
const mode=MODES[modeIdx];
const base={ enemySpeed:1.2*diff, enemySpawn:40/diff, enemyHP:1, enemyCount:6, bulletSpeed:1, dropRate:0.12, coreHP:100 };
switch(mode.id){
case 'classic': return { ...base, enemySpawn:35/diff, enemyCount:5+Math.floor(diff*2) };
case 'endless': return { ...base, enemySpawn:25/diff, enemyCount:8+Math.floor(diff*3), enemySpeed:1.4*diff };
case 'timed': return { ...base, enemySpawn:30/diff, enemyCount:6+Math.floor(diff*2), timer:60 };
case 'defend': return { ...base, enemySpawn:28/diff, enemyCount:4+Math.floor(diff*2), coreHP:80+20*(1/diff), enemySpeed:1.0*diff };
case 'bullethell': return { ...base, enemySpawn:20/diff, enemyCount:5+Math.floor(diff*2), bulletSpeed:1.6*diff, enemySpeed:0.8*diff };
case 'speedster': return { ...base, enemySpawn:30/diff, enemyCount:6+Math.floor(diff*2), enemySpeed:2.2*diff };
case 'bossrush': return { ...base, enemySpawn:0, enemyCount:0, bossOnly:true };
case 'powerup': return { ...base, enemySpawn:35/diff, enemyCount:5+Math.floor(diff*2), dropRate:0.30 };
case 'dark': return { ...base, enemySpawn:30/diff, enemyCount:6+Math.floor(diff*2), dark:true };
case 'chaos': return { ...base, enemySpawn:25/diff, enemyCount:6+Math.floor(diff*2), chaos:true };
default: return base;
}
}

function rand(a,b){ return Math.random()*(b-a)+a; }
function randInt(a,b){ return Math.floor(rand(a,b+1)); }
function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

function initStars(){ stars=[]; for(let i=0;i<100;i++){ stars.push({x:Math.random()*W,y:Math.random()*H,size:Math.random()*1.8+0.4,speed:Math.random()*0.5+0.2,brightness:Math.random()*0.6+0.3,twinkle:Math.random()*Math.PI*2}); } }

function emitExplosion(x,y,color,count=22,speed=5){
const r=parseInt(color.slice(1,3),16)||255,g=parseInt(color.slice(3,5),16)||200,b=parseInt(color.slice(5,7),16)||100;
for(let i=0;i<count;i++){ const a=rand(0,Math.PI*2), sp=rand(1,speed), sz=rand(2,6); particles.push({x:x+rand(-4,4),y:y+rand(-4,4),vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-rand(0,1.5),life:1,decay:rand(0.012,0.035),size:sz,r:clamp(r+rand(-30,30),0,255),g:clamp(g+rand(-30,30),0,255),b:clamp(b+rand(-30,30),0,255),gravity:0.04}); }
for(let i=0;i<6;i++){ const a=rand(0,Math.PI*2), sp=rand(0.5,2); particles.push({x:x+rand(-2,2),y:y+rand(-2,2),vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-rand(0,0.5),life:1,decay:rand(0.02,0.05),size:rand(1,2.5),r:255,g:255,b:255,gravity:0.01}); }
}

function spawnEnemy(isElite=false, cfg){
const mode=MODES[modeIndex].id;
const diff=DIFFICULTIES[diffIndex].multiplier;
const types=['normal','fast','heavy','shooter'];
if(mode==='bullethell') types.push('shooter','shooter');
if(mode==='speedster') types.push('fast','fast');
let type=types[randInt(0,types.length-1)];
if(isElite) type='elite';
let size,speed,color,hp,scoreVal,shootRate;
switch(type){
case 'normal': size=rand(22,30); speed=rand(1.0,2.0); color='#ff6b6b'; hp=1; scoreVal=10; shootRate=0; break;
case 'fast': size=rand(16,22); speed=rand(2.5,4.0); color='#feca57'; hp=1; scoreVal=15; shootRate=0; break;
case 'heavy': size=rand(36,48); speed=rand(0.7,1.3); color='#a29bfe'; hp=randInt(2,4); scoreVal=25; shootRate=0; break;
case 'shooter': size=rand(26,34); speed=rand(0.8,1.6); color='#ff9ff3'; hp=1; scoreVal=20; shootRate=40+randInt(0,30); break;
case 'elite': size=rand(40,56); speed=rand(0.7,1.4); color='#e056a0'; hp=randInt(4,8); scoreVal=50; shootRate=30+randInt(0,20); break;
}
if(mode==='speedster'){ speed*=1.8; size*=0.85; }
if(mode==='bullethell'){ shootRate=Math.max(20, (shootRate||40)*0.6); }
if(mode==='defend'){ hp*=1.2; }
const enemy={ type,x:rand(size/2,W-size/2), y:-size, w:size,h:size,speed:speed*(0.8+0.4*diff), color,hp,maxHp:hp,score:scoreVal, shootRate, shootTimer:randInt(0,shootRate), wobble:rand(0,Math.PI*2), wobbleSpeed:rand(0.01,0.04), wobbleAmp:type==='fast'?rand(0.5,2.0):rand(0,0.8), isElite:isElite||false, };
enemies.push(enemy);
}

function showUpgradePanel(){
gameState=STATE.UPGRADING;

function addExp(amount){
exp += amount;
expToNext = 250 + level * 120;
while(exp >= expToNext){
exp -= expToNext;
level++;
expToNext = 250 + level * 120;
showUpgradePanel();
playLevelUp();
}
updateExpBar();
}

function activateSkill(){
if(gameState!==STATE.PLAYING)return;
if(player.skillCooldown>0)return;
if(player.skillActive)return;
player.skillActive=true;
player.skillTimer=120;
player.skillCooldown=player.skillMaxCooldown;
if(player.skillType==='slow'){ emitFloatingText(W/2,H/2-40,'⏱ 时间减速','#74b9ff',36); playExplode(0.5); }
else if(player.skillType==='shield'){ player.maxShieldHP+=3; player.shieldHP=player.maxShieldHP; emitFloatingText(W/2,H/2-40,'◈ 护盾爆发','#00d2d3',36); playExplode(0.6); player.skillActive=false; player.skillTimer=0; }
}

function rectCollide(a,b){ const ax=a.x-a.w/2, ay=a.y-a.h/2; const bx=b.x-b.w/2, by=b.y-b.h/2; return ax<bx+b.w && ax+a.w>bx && ay<by+b.h && ay+a.h>by; }
function playerHit(){
if(player.invincible>0)return;
if(player.shieldHP>0){ player.shieldHP--; emitExplosion(player.x,player.y,'#00d2d3',20,3); playHit(); return; }
lives--; screenShake=10; player.invincible=80; comboCount=0; updateUI(); playExplode(0.7); emitExplosion(player.x,player.y,'#ff6b6b',25,4);
if(lives<=0){ gameOver(); }
}

canvas.addEventListener('mouseleave',()=>{});

canvas.addEventListener('touchmove',e=>{ e.preventDefault(); const t=Array.from(e.touches).find(t=>t.identifier===touchId)||e.touches[0]; if(t) handleMove(t.clientX); }, {passive:false});
canvas.addEventListener('touchend',e=>{ e.preventDefault(); touchId=null; }, {passive:false});
canvas.addEventListener('touchcancel',e=>{ e.preventDefault(); touchId=null; }, {passive:false});

// ---------- 更新 ----------
function update(){
const gp=getGamepad();
let padX=0, padY=0, padA=false;
if(gp){
const axes=gp.axes;
if(axes&&axes.length>=2){ padX=axes[0]||0; padY=axes[1]||0; if(Math.abs(padX)<0.15) padX=0; if(Math.abs(padY)<0.15) padY=0; }
if(gp.buttons&&gp.buttons.length>0){ padA=gp.buttons[0]?.pressed||false; }
}
if(gameState===STATE.GAMEOVER||gameState===STATE.MENU||gameState===STATE.UPGRADING){
if(gameState===STATE.UPGRADING||gameState===STATE.GAMEOVER) updateParticles();
if(gameState===STATE.MENU&&padA&&!gamepadButtonPressed.a){ gamepadButtonPressed.a=true; startBtn.click(); }
if(!padA) gamepadButtonPressed.a=false;
return;
}
frame++; gameTime++;
const cfg=currentCfg||getModeConfig(modeIndex,diffIndex);
const diff=DIFFICULTIES[diffIndex].multiplier;
const mode=MODES[modeIndex].id;

if(timerActive){ timerCurrent--; if(timerCurrent<=0){ gameOver(); return; } updateUI(); }
if(coreActive&&coreHP<=0){ gameOver(); return; }

const newStage=Math.floor(wave/5);
if(newStage>stage){
stage=newStage;
const expBonus=30+stage*15;
addExp(expBonus);
score+=20+stage*10;
emitFloatingText(W/2,H/2-80,`✦ 关卡 ${stage} 完成! +${expBonus}经验`,'#f9d78c',34);
playExplode(0.5);
updateUI();
}
const stageBonus=Math.floor(stage*0.8);
const baseDiff=1+stageBonus*0.2;
difficulty=baseDiff*diff;

if(enemies.length===0&&!bossActive&&!(mode==='bossrush'&&bossActive)){
wave++;
if(mode==='bossrush'){ spawnBoss(cfg); } else {
const count=Math.min(15, Math.floor(cfg.enemyCount+wave*0.6));
for(let i=0;i<count;i++){ setTimeout(()=>{ if(gameState===STATE.PLAYING) spawnEnemy(false,cfg); }, i*80); }
if(wave%3===0&&wave>0){ setTimeout(()=>{ if(gameState===STATE.PLAYING) spawnEnemy(true,cfg); }, 200); }
emitFloatingText(W/2,50,`~ 波次 ${wave}`,'rgba(255,220,190,0.3)',22);
}
updateUI();
}

let moveX=0, moveY=0;
if(keys['ArrowLeft']||keys['a']||keys['A']) moveX=-1;
if(keys['ArrowRight']||keys['d']||keys['D']) moveX=1;
if(keys['ArrowUp']||keys['w']||keys['W']) moveY=-1;
if(keys['ArrowDown']||keys['s']||keys['S']) moveY=1;

if(gp&&(Math.abs(padX)>0.05||Math.abs(padY)>0.05)){
moveX=padX; moveY=padY; mouseActive=false;
if(padA&&!gamepadButtonPressed.a){ gamepadButtonPressed.a=true; activateSkill(); }
if(!padA) gamepadButtonPressed.a=false;
} else {
if(moveX===0&&moveY===0&&mouseActive){
const dx=targetX-player.x;
const followSpeed=sensitivity*1.2;
player.x+=dx*followSpeed;
}
}
if(moveX!==0||moveY!==0){
const len=Math.hypot(moveX,moveY);
const normX=moveX/len, normY=moveY/len;
const spd=player.speed*1.2;
player.x+=normX*spd;
player.y+=normY*spd;
mouseActive=false;
}
player.x=clamp(player.x,player.w/2,W-player.w/2);
player.y=clamp(player.y,player.h/2+20,H-20);

if(player.skillCooldown>0) player.skillCooldown--;
if(player.skillActive){ player.skillTimer--; if(player.skillTimer<=0) player.skillActive=false; }
if(player.rapidFire){ player.rapidTimer--; if(player.rapidTimer<=0){ player.rapidFire=false; player.shootInterval=8; } }

const interval=player.rapidFire?3:player.shootInterval;
if(player.shootCooldown<=0){
bullets.push({x:player.x,y:player.y-player.h/2-6,w:player.bulletSize,h:player.bulletSize*3,speed:player.bulletSpeed,damage:player.damage});
for(let i=0;i<player.extraBullets;i++){ const off=(i+1)*12; bullets.push({x:player.x-off,y:player.y-player.h/2-4,w:player.bulletSize*0.8,h:player.bulletSize*2.5,speed:player.bulletSpeed,damage:player.damage*0.8}); bullets.push({x:player.x+off,y:player.y-player.h/2-4,w:player.bulletSize*0.8,h:player.bulletSize*2.5,speed:player.bulletSpeed,damage:player.damage*0.8}); }
player.shootCooldown=Math.max(3,interval-Math.floor(diff*0.1));
playShoot();
} else player.shootCooldown--;

for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i]; b.y-=b.speed; if(b.y<-20) bullets.splice(i,1); }
const slow=(player.skillActive&&player.skillType==='slow')?0.4:1.0;
for(let i=enemyBullets.length-1;i>=0;i--){ const b=enemyBullets[i]; b.x+=(b.vx||0)*slow; b.y+=(b.vy||b.speed)*slow; if(b.y>H+20||b.x<-20||b.x>W+20){ enemyBullets.splice(i,1); } else { if(rectCollide({x:player.x,y:player.y,w:player.w*0.6,h:player.h*0.6},{x:b.x,y:b.y,w:b.w,h:b.h})){ playerHit(); enemyBullets.splice(i,1); } } }

const spawnRate=Math.max(6, cfg.enemySpawn - wave*0.2 - stage*0.5);
const enemyLimit=Math.min(40, cfg.enemyCount + wave*1.2 + stage*2);
if(mode!=='bossrush'&&!bossActive&&enemies.length<enemyLimit){
if(frame%Math.floor(spawnRate)===0&&Math.random()<0.4+(wave*0.01)){ spawnEnemy(false,cfg); }
}
for(let i=enemies.length-1;i>=0;i--){
const e=enemies[i];
e.y+=e.speed*(player.skillActive&&player.skillType==='slow'?0.4:1);
e.wobble+=e.wobbleSpeed;
e.x+=Math.sin(e.wobble)*e.wobbleAmp;
e.x=clamp(e.x,e.w/2,W-e.w/2);
if(e.y>H+40){ enemies.splice(i,1); continue; }
if(e.type==='shooter'||e.isElite){
const rate=e.isElite?Math.max(15,35-diff*3):e.shootRate;
if(rate>0){
e.shootTimer-=slow;
if(e.shootTimer<=0){
e.shootTimer=rate;
const angle=Math.atan2(player.y-e.y,player.x-e.x);
const spd=1.8+diff*0.4;
const spread=e.isElite?0.4:0.2;
for(let k=-1;k<=1;k++){ const a=angle+k*spread; enemyBullets.push({x:e.x,y:e.y+e.h/2,w:e.isElite?8:6,h:e.isElite?8:6,speed:spd,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd}); }
}
}
}
if(player.invincible<=0){ if(rectCollide(player,e)){ playerHit(); enemies.splice(i,1); continue; } }
}

if(bossActive&&boss){
const b=boss;
if(!b.entered){ b.y+=0.8; if(b.y>=80){ b.entered=true; b.y=80; } } else {
const slowB=(player.skillActive&&player.skillType==='slow')?0.4:1;
b.moveTimer++;
if(b.moveTimer%90===0) b.targetX=rand(60,W-60);
const dx=b.targetX-b.x;
b.x+=Math.sign(dx)*0.6*(1+diff*0.1)*slowB;
b.x=clamp(b.x,b.w/2,W-b.w/2);
b.shootTimer-=slowB;
if(b.shootTimer<=0){
b.shootTimer=Math.max(18,30-diff*2);
const count=(b.hp/b.maxHp < b.enrageThreshold)?5:3;
for(let k=0;k<count;k++){ const angle=Math.atan2(player.y-b.y,player.x-b.x)+(k-(count-1)/2)*0.25; const spd=2.0+diff*0.3; enemyBullets.push({x:b.x,y:b.y+b.h/2,w:8,h:8,speed:spd,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd}); }
}
}
if(player.invincible<=0&&b.entered){ if(rectCollide(player,b)) playerHit(); }
if(b.hp<=0){
emitExplosion(b.x,b.y,b.color,60,10);
score+=b.score; addExp(b.score); kills+=5; comboCount+=5; if(comboCount>maxCombo) maxCombo=comboCount;
emitFloatingText(b.x,b.y-30,`👑 BOSS 击败! +${b.score}`,'#ffeaa7',36);
playExplode(0.3);
bossActive=false; boss=null; screenShake=15; updateUI(); updateExpBar();
for(let i=0;i<4;i++) spawnPowerup(b.x+rand(-50,50), b.y+rand(-30,30),cfg);
}
}

for(let i=bullets.length-1;i>=0;i--){
const b=bullets[i]; let used=false;
for(let j=enemies.length-1;j>=0;j--){
const e=enemies[j];
if(rectCollide(b,e)){
e.hp-=b.damage; used=true; playHit();
if(e.hp<=0){
score+=e.score; addExp(e.score); kills++; totalKills++; comboCount++;
if(comboCount>maxCombo) maxCombo=comboCount;
const bonus=Math.floor(comboCount/5); if(bonus>0) score+=bonus;
updateUI(); updateExpBar();
emitExplosion(e.x,e.y,e.color,28,5.5); playExplode(0.6+Math.random()*0.4);
let txt=`+${e.score}`; if(bonus>0) txt+=` 🔥x${bonus+1}`; if(comboCount>=10) txt+=' COMBO!';
emitFloatingText(e.x,e.y-10,txt,'#f9d78c',comboCount>=10?30:22);
screenShake=Math.max(screenShake,3);
spawnPowerup(e.x,e.y,cfg);
enemies.splice(j,1);
} else { emitExplosion(e.x,e.y,'#ffffff',8,2); }
break;
}
}
if(!used&&bossActive&&boss){
if(rectCollide(b,boss)){ boss.hp-=b.damage; used=true; playHit(); emitExplosion(b.x,b.y,'#e17055',8,2); }
}
if(used) bullets.splice(i,1);
}

if(coreActive){
for(const e of enemies){ if(dist(e,{x:W/2,y:H/2})<60){ coreHP-=0.03*diff; if(coreHP<=0){ coreHP=0; gameOver(); return; } } }
if(frame%10===0){ particles.push({x:W/2+rand(-20,20),y:H/2+rand(-20,20),vx:rand(-0.3,0.3),vy:rand(-1,-0.5),life:1,decay:0.02,size:3,r:0,g:210,b:211,gravity:0}); }
}

updateParticles();
for(let i=floatingTexts.length-1;i>=0;i--){ const ft=floatingTexts[i]; ft.y+=ft.vy; ft.life-=ft.decay; if(ft.life<=0) floatingTexts.splice(i,1); }
for(let i=powerups.length-1;i>=0;i--){ const p=powerups[i]; p.y+=p.speed; p.life--; if(p.y>H+20||p.life<=0){ powerups.splice(i,1); continue; } if(Math.hypot(p.x-player.x,p.y-player.y)<p.radius+player.w/2){ if(p.type==='shield'){ player.maxShieldHP=Math.min(6,player.maxShieldHP+1); player.shieldHP=player.maxShieldHP; emitFloatingText(p.x,p.y,'◈ +1护盾','#00d2d3',28); } else if(p.type==='rapid'){ player.rapidFire=true; player.rapidTimer=480; player.shootInterval=3; emitFloatingText(p.x,p.y,'⚡ 速射!','#f9ca24',28); } else if(p.type==='bomb'){ player.skillCooldown=Math.max(0,player.skillCooldown-150); emitFloatingText(p.x,p.y,'💣 冷却-150','#ff6b6b',28); } playHit(); powerups.splice(i,1); } }
for(const star of stars){ star.y+=star.speed*(0.8+diff*0.03); star.twinkle+=0.02; if(star.y>H){ star.y=0; star.x=Math.random()*W; } }
if(player.invincible>0) player.invincible--;
if(screenShake>0){ screenShake*=0.88; if(screenShake<0.1) screenShake=0; }
updateUI(); updateExpBar();
}

function updateParticles(){
for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity||0; p.vx*=0.99; p.vy*=0.99; p.life-=p.decay; if(p.life<=0) particles.splice(i,1); }
if(particles.length>600) particles.splice(0,particles.length-600);
}

// ---------- 绘制 ----------
function draw(){
ctx.save();
if(screenShake>0.5){ const sx=(Math.random()-0.5)*screenShake*1.2; const sy=(Math.random()-0.5)*screenShake*1.2; ctx.translate(sx,sy); }
const grad=ctx.createLinearGradient(0,0,0,H);
grad.addColorStop(0,'#0e0b1a');
grad.addColorStop(0.5,'#130f22');
grad.addColorStop(1,'#0b0815');
ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
if(darkMode){
const grd=ctx.createRadialGradient(player.x,player.y,30,player.x,player.y,220);
grd.addColorStop(0,'rgba(0,0,0,0)');
grd.addColorStop(0.6,'rgba(0,0,0,0.2)');
grd.addColorStop(1,'rgba(0,0,0,0.7)');
ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
}
if(chaosMode){ ctx.fillStyle=`rgba(${randInt(0,50)},${randInt(0,50)},${randInt(0,50)},0.03)`; ctx.fillRect(0,0,W,H); }
for(const star of stars){ const alpha=star.brightness*(0.7+0.3*Math.sin(star.twinkle)); ctx.globalAlpha=alpha; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(star.x,star.y,star.size,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1;
for(const p of particles){ ctx.globalAlpha=p.life*0.9; const r=p.r||255,g=p.g||200,b=p.b||100; ctx.fillStyle=`rgb(${r|0},${g|0},${b|0})`; ctx.shadowColor=`rgba(${r|0},${g|0},${b|0},0.3)`; ctx.shadowBlur=8; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life*0.9+0.5,0,Math.PI*2); ctx.fill(); } ctx.shadowBlur=0; ctx.globalAlpha=1;
if(coreActive){
const pct=coreHP/coreMaxHP;
ctx.shadowColor='rgba(0,210,211,0.3)'; ctx.shadowBlur=40;
ctx.strokeStyle=`rgba(0,210,211,${0.3+0.2*Math.sin(frame*0.02)})`; ctx.lineWidth=3;
ctx.beginPath(); ctx.arc(W/2,H/2,45,0,Math.PI*2); ctx.stroke();
ctx.fillStyle=`rgba(0,210,211,${0.1+0.05*Math.sin(frame*0.03)})`;
ctx.beginPath(); ctx.arc(W/2,H/2,35,0,Math.PI*2); ctx.fill();
ctx.fillStyle='#fff'; ctx.font='14px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
ctx.fillText('◈ '+Math.floor(pct*100)+'%',W/2,H/2);
ctx.shadowBlur=0;
}
for(const p of powerups){ ctx.shadowColor=p.color+'80'; ctx.shadowBlur=20; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; ctx.fillStyle='#fff'; ctx.font='18px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(p.symbol,p.x,p.y+1); }
for(const b of enemyBullets){ ctx.fillStyle='#ff6b6b'; ctx.shadowColor='rgba(255,80,80,0.6)'; ctx.shadowBlur=15; ctx.beginPath(); ctx.arc(b.x,b.y,b.w/2,0,Math.PI*2); ctx.fill(); } ctx.shadowBlur=0;
for(const b of bullets){ const gB=ctx.createLinearGradient(b.x,b.y-b.h/2,b.x,b.y+b.h/2); gB.addColorStop(0,'rgba(180,240,255,0)'); gB.addColorStop(0.3,'rgba(100,220,255,0.9)'); gB.addColorStop(0.7,'rgba(100,220,255,0.9)'); gB.addColorStop(1,'rgba(180,240,255,0)'); ctx.fillStyle=gB; ctx.shadowColor='rgba(100,220,255,0.5)'; ctx.shadowBlur=14; ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h); } ctx.shadowBlur=0;
if(bossActive&&boss){ const b=boss; ctx.shadowColor=b.color+'80'; ctx.shadowBlur=40; ctx.fillStyle=b.color; ctx.beginPath(); ctx.arc(b.x,b.y,b.w/2,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(b.x-20,b.y-10,10,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(b.x+20,b.y-10,10,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.arc(b.x-22,b.y-6,5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(b.x+18,b.y-6,5,0,Math.PI*2); ctx.fill(); const barW=140,barH=8,barX=b.x-barW/2,barY=b.y-b.h/2-24; ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(barX,barY,barW,barH); const pct=b.hp/b.maxHp; ctx.fillStyle=pct<0.3?'#ff6b6b':'#e17055'; ctx.fillRect(barX,barY,barW*pct,barH); ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='12px Arial'; ctx.textAlign='center'; ctx.fillText('👑 BOSS',b.x,barY-8); if(pct<0.4){ ctx.fillStyle='rgba(255,50,50,0.15)'; ctx.beginPath(); ctx.arc(b.x,b.y,b.w/2+6,0,Math.PI*2); ctx.fill(); } }
for(const e of enemies){ ctx.shadowColor=e.color+'60'; ctx.shadowBlur=20; ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x,e.y,e.w/2,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; if(e.isElite){ ctx.strokeStyle='#ffeaa7'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(e.x,e.y,e.w/2+4,0,Math.PI*2); ctx.stroke(); } ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.arc(e.x-e.w*0.15,e.y-e.h*0.15,e.w*0.25,0,Math.PI*2); ctx.fill(); ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(e.x-e.w*0.25,e.y-e.h*0.1,e.w*0.12,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(e.x+e.w*0.25,e.y-e.h*0.1,e.w*0.12,0,Math.PI*2); ctx.fill(); ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.arc(e.x-e.w*0.2,e.y-e.h*0.05,e.w*0.06,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(e.x+e.w*0.3,e.y-e.h*0.05,e.w*0.06,0,Math.PI*2); ctx.fill(); if(e.maxHp>1){ const bw=e.w*0.7,bh=4,by=e.y-e.h/2-8; ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(e.x-bw/2,by,bw,bh); ctx.fillStyle='#4ecdc4'; ctx.fillRect(e.x-bw/2,by,bw*(e.hp/e.maxHp),bh); } if(e.type==='shooter'||e.isElite){ ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.font='11px Arial'; ctx.textAlign='center'; ctx.fillText('✦',e.x,e.y+e.h/2+14); } } ctx.shadowBlur=0;
if(gameState===STATE.PLAYING||gameState===STATE.GAMEOVER){ const p=player; const show=player.invincible<=0||Math.floor(player.invincible/4)%2===0; if(show){ ctx.save(); ctx.translate(p.x,p.y); const flick=Math.sin(frame*0.3)*0.3+0.7; const gE=ctx.createRadialGradient(0,p.h/2+4,2,0,p.h/2+12,20*flick); gE.addColorStop(0,`rgba(100,200,255,${0.9*flick})`); gE.addColorStop(0.3,`rgba(50,150,255,${0.6*flick})`); gE.addColorStop(1,'rgba(50,100,255,0)'); ctx.fillStyle=gE; ctx.beginPath(); ctx.ellipse(0,p.h/2+6,12*flick,18*flick,0,0,Math.PI*2); ctx.fill(); ctx.shadowColor='rgba(80,200,255,0.5)'; ctx.shadowBlur=30; ctx.fillStyle='#d4c4f0'; ctx.beginPath(); ctx.moveTo(0,-p.h/2); ctx.lineTo(-p.w/2,p.h/2); ctx.lineTo(-p.w/4,p.h/2-6); ctx.lineTo(0,p.h/2-2); ctx.lineTo(p.w/4,p.h/2-6); ctx.lineTo(p.w/2,p.h/2); ctx.closePath(); ctx.fill(); ctx.shadowBlur=10; ctx.fillStyle='rgba(220,210,255,0.3)'; ctx.beginPath(); ctx.ellipse(0,-p.h*0.1,p.w*0.2,p.h*0.2,0,0,Math.PI*2); ctx.fill(); if(player.shieldHP>0){ ctx.shadowBlur=30; ctx.strokeStyle='rgba(0,210,211,0.6)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,p.w*0.8,0,Math.PI*2); ctx.stroke(); ctx.strokeStyle='rgba(0,210,211,0.15)'; ctx.lineWidth=6; ctx.beginPath(); ctx.arc(0,0,p.w*0.9,0,Math.PI*2); ctx.stroke(); ctx.fillStyle='#00d2d3'; ctx.font='12px Arial'; ctx.textAlign='center'; ctx.fillText('◈'+player.shieldHP,0,p.h/2+28); } ctx.shadowBlur=0; ctx.restore(); if(player.invincible>0){ ctx.strokeStyle=`rgba(100,220,255,${0.15+0.1*Math.sin(frame*0.2)})`; ctx.lineWidth=2; ctx.setLineDash([6,8]); ctx.beginPath(); ctx.arc(p.x,p.y,p.w*0.8,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]); } } }
for(const ft of floatingTexts){ ctx.globalAlpha=ft.life; ctx.fillStyle=ft.color; ctx.font=`bold ${ft.size}px 'Segoe UI',sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=12; ctx.fillText(ft.text,ft.x,ft.y); } ctx.shadowBlur=0; ctx.globalAlpha=1;
if(gameState===STATE.GAMEOVER){
ctx.fillStyle=`rgba(0,0,0,${0.55+0.1*Math.sin(frame*0.02)})`; ctx.fillRect(0,0,W,H);
ctx.textAlign='center'; ctx.textBaseline='middle';
ctx.shadowColor='rgba(255,50,50,0.4)'; ctx.shadowBlur=40;
ctx.fillStyle='#ff7b8a'; ctx.font='bold 52px "Segoe UI",sans-serif'; ctx.fillText('✦ 坠毁',W/2,H/2-80);
ctx.shadowBlur=0; ctx.fillStyle='rgba(255,235,220,0.8)'; ctx.font='28px "Segoe UI",sans-serif'; ctx.fillText('得分 '+score,W/2,H/2);
ctx.fillStyle='rgba(255,200,160,0.5)'; ctx.font='18px "Segoe UI",sans-serif'; ctx.fillText('等级 '+level+' · 连击 '+maxCombo,W/2,H/2+50);
ctx.fillStyle='rgba(255,220,190,0.2)'; ctx.font='15px "Segoe UI",sans-serif'; ctx.fillText('点击 / 空格 重新开始',W/2,H/2+110);
ctx.shadowBlur=0;
}
if(comboCount>=3&&gameState===STATE.PLAYING){
ctx.textAlign='center'; ctx.textBaseline='bottom';
const alpha=Math.min(1,comboCount/10);
const size=18+Math.min(comboCount,20)*0.5;
ctx.fillStyle=`rgba(249,215,140,${0.5+0.3*Math.sin(frame*0.05)})`;
ctx.font=`bold ${size}px "Segoe UI",sans-serif`;
ctx.shadowColor='rgba(249,215,140,0.2)';
ctx.shadowBlur=20;
ctx.fillText('✦ '+comboCount+' 连击',W/2,H-120);
ctx.shadowBlur=0;
}
ctx.restore();
}

function gameLoop(){ update(); draw(); requestAnimationFrame(gameLoop); }
resetGame(getModeConfig(0,0));
gameLoop();

function resizeCanvas(){ const wrapper=canvas.parentElement; const maxW=Math.min(window.innerWidth-24,600); const ratio=800/600; let w=maxW; let h=w*ratio; if(h>window.innerHeight-40){ h=window.innerHeight-40; w=h/ratio; } canvas.style.width=w+'px'; canvas.style.height=h+'px'; }
window.addEventListener('resize',resizeCanvas); resizeCanvas();
canvas.setAttribute('tabindex','0'); canvas.focus();
</script>
